<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Talents — IdleOn Companion</title>
<link rel="stylesheet" href="companion.css">
<script src="ui.js"></script>
<style>
  /* Shared with w1-w6.html — the generic recipe-breakdown renderer's own look. */
  td { vertical-align: top; white-space: normal; }
  tr.expander { cursor: pointer; }
  tr.expander:hover td { background: var(--glow); }
  tr.parts td { border-bottom: none; padding-top: 0; }
  .partrow { color: var(--ink-2); font-size: 12px; padding-left: 18px; border-left: 2px solid var(--grid); margin: 1px 0; }
  .note { color: var(--ink-2); white-space: normal; max-width: 560px; font-size: 12px; }
  .expr { color: var(--ink-muted); font-size: 10.5px; white-space: normal; font-weight: 400; }
  .where { color: var(--accent); font-size: 11.5px; margin-top: 1px; font-weight: 600; }
  .showmore { background: none; border: none; color: var(--accent); cursor: pointer; font: inherit; font-weight: 650; padding: 6px 0; }
  select.inlinesel { font-size: 12px; }
  .lowerbound { border-left: 3px solid var(--warning); background: rgba(250, 178, 25, .06); padding: 6px 10px; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  details.fold > summary { cursor: pointer; color: var(--accent); font-weight: 650; font-size: 13px; padding: 4px 0; }
  ul.unknowns { margin: 4px 0 0 18px; color: var(--ink-2); font-size: 12.5px; }
  ul.unknowns li { margin-bottom: 3px; }
  .tip { cursor: help; color: var(--accent); font-weight: 700; border-bottom: 1px dotted var(--accent); }
  .subhead { font-size: 13px; margin: 4px 0 8px; }
  .star { color: var(--warning); font-weight: 800; }
</style>
</head>
<body>
<header class="app">
  <h1><img class="px" src="/idleon-toolbox/public/data/LegendTalentBG.png" alt="" width="26" height="26">Legend Talents</h1>
  <nav class="pages"></nav>
  <span class="spacer"></span>
  <span class="meta" id="meta"></span>
  <span id="uiOptions"></span>
</header>

<div id="err" class="err"></div>
<div class="cards" id="tiles"></div>

<section class="panel" id="talentsPanel" style="display:none"></section>
<div id="rmod_legendTalents"></div>

<script>
const $ = (id) => document.getElementById(id);
let SNAP = null, DATA = null, SERIES = {};
let L = null;   // SNAP.entities.w7.legendTalents shortcut
let SORT = "star";   // "star" | "level" | "coeff" — display-only goal selector
let SHOWALL = false, SHOWALLMOD = false;

const fmt = (n) => {
  if (n == null || !isFinite(n)) return "—";
  const a = Math.abs(n);
  if (a >= 1e15) return n.toExponential(2).replace("e+", "e");
  if (a >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (a >= 1e4) return Math.round(n).toLocaleString();
  return +n.toFixed(2) + "";
};
const chip = (status) => status === "computed" ? "" :
  `<span class="chip ${status === "partial" ? "soon" : status === "user-supplied" ? "user" : status === "per-char" ? "pc" : "dead"}">${status}</span>`;

function spark(key) {
  const pts = SERIES[key];
  if (!pts || pts.length < 2) return "";
  const w = 72, h = 18;
  const vs = pts.map((p) => p.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const y = (v) => max === min ? h / 2 : h - 2 - (v - min) / (max - min) * (h - 4);
  const step = w / (pts.length - 1);
  const d = vs.map((v, i) => `${(i * step).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const up = vs[vs.length - 1] > vs[0];
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${d}" fill="none"
    stroke="${up ? "var(--good)" : "var(--ink-muted)"}" stroke-width="1.5"/></svg>`;
}

/* ============================================================================================
 * Top KPI strip.
 * ============================================================================================ */
function renderTiles() {
  const p = L.points;
  const maxed = L.talents.filter((t) => t.level >= t.maxLv).length;
  const consumersMaxed = L.talents.filter((t) => t.knownConsumer && t.level >= t.maxLv).length;
  const consumersTotal = L.talents.filter((t) => t.knownConsumer).length;
  $("tiles").innerHTML = `
    <div class="tile">${UI.sprite("LegendTalentBG", 28, "data")}<div class="label">Points available</div><div class="value">${(p.lowerBound ? "≥ " : "") + fmt(p.available)}</div><div class="sub">${fmt(p.earned)} earned, ${fmt(p.spent)} spent</div></div>
    <div class="tile"><div class="label">Talents maxed</div><div class="value">${maxed}<span class="of">/${L.talents.length}</span></div><div class="sub">real talents only (ids 40-49 are unimplemented filler)</div></div>
    <div class="tile"><div class="label">★ known-consumer talents maxed</div><div class="value">${consumersMaxed}<span class="of">/${consumersTotal}</span></div><div class="sub">feed another stat recipe directly</div></div>
  `;
}

/* ============================================================================================
 * Talents table — sort is a display-only goal selector (★-first / level / coeff), never a
 * hardcoded "spend here" recommendation. ★ = confirmed input to another registered stat recipe
 * (drop rate, class EXP, kruk bubbles, refinery speed, ...) — see stats/legend-talents.mjs.
 * ============================================================================================ */
function sortedTalents() {
  const list = L.talents.slice();
  if (SORT === "star") list.sort((a, b) => (b.knownConsumer - a.knownConsumer) || (b.level - a.level));
  else if (SORT === "level") list.sort((a, b) => b.level - a.level || b.maxLv - a.maxLv);
  else if (SORT === "coeff") list.sort((a, b) => b.coeff - a.coeff);
  return list;
}

function talentRowHtml(t) {
  return `<tr>
    <td><b>${t.knownConsumer ? '<span class="star">★</span> ' : ""}${t.name}</b><div class="where">${t.short}</div></td>
    <td style="text-align:right">${t.level}<span class="of">/${t.maxLv}</span></td>
    <td style="text-align:right">${fmt(t.coeff)}</td>
    <td style="text-align:right">+${fmt(t.bonus)}</td>
  </tr>`;
}

function renderTalents() {
  const list = sortedTalents();
  const rows = SHOWALL ? list : list.slice(0, 10);
  $("talentsPanel").style.display = "";
  $("talentsPanel").innerHTML = `
    <h2>${UI.sprite("LegendTalentBG", 20, "data")} Talents <span class="hint">40 real talents (ids 40-49 are unimplemented "filler" rows in the client, omitted). Each is a DIFFERENT downstream unit — drop rate, statue drops, refinery speed, Villager EXP, etc.
      <span class="tip" title="★ marks a talent that is a confirmed input to another registered stat recipe on this site (e.g. talent 1 -> Drop Rate, talent 19 -> Refinery Cycle Speed) — high value to keep leveled if you already care about that recipe. Not a universal priority ranking.">ⓘ</span></span></h2>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span class="note">Sort:</span>
      <select class="inlinesel" id="sortSel">
        <option value="star" ${SORT === "star" ? "selected" : ""}>★ known-consumer first</option>
        <option value="level" ${SORT === "level" ? "selected" : ""}>Level (highest first)</option>
        <option value="coeff" ${SORT === "coeff" ? "selected" : ""}>Coefficient (highest first)</option>
      </select>
      <span class="note">display order only — spend where YOUR goals need it, not by this list.</span>
    </div>
    <div class="scroll"><table>
      <tr><th>Talent</th><th style="text-align:right">Level</th><th style="text-align:right">Coeff</th><th style="text-align:right">Current bonus</th></tr>
      ${rows.map(talentRowHtml).join("")}
    </table></div>
    ${list.length > 10 ? `<button class="showmore" id="talentsShowMore">${SHOWALL ? "show fewer" : `show ${list.length - 10} more`}</button>` : ""}
  `;
  const sel = $("sortSel");
  if (sel) sel.onchange = (e) => { SORT = e.target.value; renderTalents(); };
  const more = $("talentsShowMore");
  if (more) more.onclick = () => { SHOWALL = !SHOWALL; renderTalents(); };
}

/* ============================================================================================
 * legendTalents recipe embed — same term-rendering pattern as w1-w6.html's RECIPE_MODULES,
 * but this recipe has no per-character split (account-wide) and format "points" (a monotonic
 * progress index, not a single meaningful multiplier — see stats/legend-talents.mjs).
 * ============================================================================================ */
function bucketTerms(r) {
  const isNeutral = (t) => t.kind === "add" && t.value === 0;
  const locked = r.terms.filter((t) => isNeutral(t) && t.status !== "unknown");
  const lockedSet = new Set(locked);
  const rest = r.terms.filter((t) => !lockedSet.has(t)).sort((a, b) => (b.value || 0) - (a.value || 0));
  return { rest, locked };
}

function termRow(t, disp) {
  const d = disp[t.id] || {};
  const label = d.label || t.key;
  const key = `stat.legendTalents.${t.id}`;
  return `<tr>
      <td style="max-width:380px"><b>${label}</b>${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
      <td style="text-align:right">+${fmt(t.value)} pts</td>
      <td>${chip(t.status)}</td>
      <td>${spark(key)}</td>
      <td class="note">${d.how || t.note || ""}</td>
    </tr>`;
}

function lockedRow(t, disp) {
  const d = disp[t.id] || {};
  return `<tr class="dim">
    <td style="max-width:380px"><b>${d.label || t.key}</b>${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
    <td style="text-align:right">—</td>
    <td><span class="chip dead">0 pts spent</span></td>
    <td></td>
    <td class="note">No points spent on this talent yet.</td>
  </tr>`;
}

function renderModule() {
  const host = $("rmod_legendTalents");
  const st = DATA?.stats?.legendTalents;
  if (!host) return;
  if (!st) {
    host.innerHTML = `<section class="panel pending"><h2>Legend Talents recipe <span class="pill-pending">recipe pending</span></h2>
      <p class="note">Sync a save with a stored raw snapshot to unlock the full per-talent breakdown + history below.</p></section>`;
    return;
  }
  const r = st.collapsed;
  const disp = st.display || {};
  const { rest, locked } = bucketTerms(r);
  const unknownCount = r.terms.filter((t) => t.status === "unknown").length;
  const rows = SHOWALLMOD ? rest : rest.slice(0, 12);
  host.innerHTML = `<section class="panel" id="mod_legendTalents">
    <h2>${UI.sprite("LegendTalentBG", 20, "data")} Full Breakdown &amp; History <span class="hint">Every talent's current bonus as a stat-recipe term — this is what unlocks per-term time-series charts.</span></h2>
    <div class="cards" style="margin-bottom:10px">
      <div class="tile"><div class="label">Progress index</div><div class="value">${fmt(r.value)} pts</div><div class="sub">sum of all 40 bonuses — not a single meaningful unit, see (i) above</div></div>
      <div class="tile"><div class="label">Coverage</div><div class="value">${r.terms.length - unknownCount}<span class="of">/${r.terms.length}</span></div><div class="sub">terms computed</div></div>
      ${locked.length ? `<div class="tile"><div class="label">Not yet spent</div><div class="value">${locked.length}</div><div class="sub">0 points on these talents</div></div>` : ""}
    </div>
    <div class="scroll"><table>
      <tr><th>Talent</th><th style="text-align:right">Bonus</th><th>Status</th><th>History</th><th>How it works</th></tr>
      ${rows.map((t) => termRow(t, disp)).join("")}
    </table></div>
    ${rest.length > 12 ? `<button class="showmore" id="modShowMore">${SHOWALLMOD ? "show fewer" : `show ${rest.length - 12} more`}</button>` : ""}
    ${locked.length ? `<details class="fold" style="margin-top:6px"><summary>${locked.length} talent${locked.length > 1 ? "s" : ""} with 0 points spent</summary>
      <div class="scroll"><table>${locked.map((t) => lockedRow(t, disp)).join("")}</table></div>
    </details>` : ""}
  </section>`;
  const more = $("modShowMore");
  if (more) more.onclick = () => { SHOWALLMOD = !SHOWALLMOD; renderModule(); };
}

async function loadHistory() {
  const st = DATA?.stats?.legendTalents;
  if (!st) return;
  const keys = ["stat.legendTalents"];
  for (const t of st.collapsed.terms) if (t.status !== "unknown") keys.push(`stat.legendTalents.${t.id}`);
  try {
    const res = await fetch(`/api/history?keys=${keys.join(",")}`);
    SERIES = (await res.json()).series || {};
  } catch { SERIES = {}; }
}

/* ============================================================================================
 * Boot.
 * ============================================================================================ */
async function boot() {
  try {
    const stateRes = await fetch("/api/state");
    const state = await stateRes.json();
    if (!state.snapshot) { $("err").textContent = "No snapshot yet — Sync on the dashboard first."; return; }
    SNAP = state.snapshot;
    $("meta").textContent = new Date(SNAP.ts).toLocaleString();
    if (!SNAP.entities?.w7) {
      $("err").innerHTML = `No <code>w7</code> entity on this snapshot — run <b>POST /api/rebuild</b>, then reload.`;
      return;
    }
    L = SNAP.entities.w7.legendTalents;

    const statsRes = await fetch("/api/stats");
    const statsJson = await statsRes.json();
    DATA = statsJson.ok && statsJson.stats ? statsJson : null;
    if (!DATA) $("err").textContent = "No snapshot with a stored raw save yet — Sync first to unlock the recipe breakdown below.";

    renderTiles();
    renderTalents();
    renderModule();
    await loadHistory();
    renderModule();
  } catch (e) { $("err").textContent = "Server error: " + e.message + " — is the companion server running?"; }
}
boot();
</script>
</body>
</html>
