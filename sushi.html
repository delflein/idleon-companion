<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushi Station — IdleOn Companion</title>
<link rel="stylesheet" href="companion.css">
<script src="ui.js"></script>
<style>
  td { vertical-align: top; white-space: normal; }
  .note { color: var(--ink-2); white-space: normal; max-width: 560px; font-size: 12px; }
  .where { color: var(--accent); font-size: 11.5px; margin-top: 1px; font-weight: 600; }
  .showmore { background: none; border: none; color: var(--accent); cursor: pointer; font: inherit; font-weight: 650; padding: 6px 0; }
  details.fold > summary { cursor: pointer; color: var(--accent); font-weight: 650; font-size: 13px; padding: 4px 0; }
  ul.unknowns { margin: 4px 0 0 18px; color: var(--ink-2); font-size: 12.5px; }
  .subhead { font-size: 13px; margin: 4px 0 8px; }
  .dishladder { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .dishladder span { font-size: 10.5px; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); color: var(--ink-muted); }
  .dishladder span.got { border-color: rgba(12,163,12,.5); color: var(--good); }
</style>
</head>
<body>
<header class="app">
  <h1><img class="px" src="/public/assets/data/Sushi1.png" alt="" width="26" height="26">Sushi Station</h1>
  <nav class="pages"></nav>
  <span class="spacer"></span>
  <span class="meta" id="meta"></span>
  <span id="uiOptions"></span>
</header>

<div id="err" class="err"></div>
<div class="cards" id="tiles"></div>

<section class="panel" id="sushiPanel" style="display:none"></section>
<div id="rmod_sushiRoG"></div>

<script>
const $ = (id) => document.getElementById(id);
let SNAP = null, DATA = null, GLOSS = null, SERIES = {};
let SU = null;   // SNAP.entities.w7.sushi shortcut
let SHOWALLMOD = false;

const fmt = (n) => {
  if (n == null || !isFinite(n)) return "—";
  const a = Math.abs(n);
  if (a >= 1e15) return n.toExponential(2).replace("e+", "e");
  if (a >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (a >= 1e4) return Math.round(n).toLocaleString();
  return +n.toFixed(2) + "";
};
const chip = (status) => status === "computed" ? "" :
  `<span class="chip ${status === "partial" ? "soon" : status === "user-supplied" ? "user" : status === "per-char" ? "pc" : "dead"}">${status}</span>`;

function spark(key) {
  const pts = SERIES[key];
  if (!pts || pts.length < 2) return "";
  const w = 72, h = 18;
  const vs = pts.map((p) => p.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const y = (v) => max === min ? h / 2 : h - 2 - (v - min) / (max - min) * (h - 4);
  const step = w / (pts.length - 1);
  const d = vs.map((v, i) => `${(i * step).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const up = vs[vs.length - 1] > vs[0];
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${d}" fill="none"
    stroke="${up ? "var(--good)" : "var(--ink-muted)"}" stroke-width="1.5"/></svg>`;
}

/* ============================================================================================
 * Top KPI strip.
 * ============================================================================================ */
function renderTiles() {
  $("tiles").innerHTML = `
    <div class="tile">${UI.sprite("Sushi1", 28, "data")}<div class="label">Dishes unlocked</div><div class="value">${SU.dishesUnlocked}<span class="of">/${SU.dishesTotal}</span></div><div class="sub">${SU.highestDish ? SU.highestDish.replace(/_/g, " ") : "no dishes yet"}</div></div>
    <div class="tile"><div class="label">Rift of Gods bonuses active</div><div class="value">${SU.rogActive}<span class="of">/${SU.rog.length}</span></div><div class="sub">unlock 1 more RoG slot per new dish tier</div></div>
    <div class="tile"><div class="label">Shop upgrades bought</div><div class="value">${SU.shopBought}</div><div class="sub">aggregate count only — see gap note below</div></div>
  `;
}

/* ============================================================================================
 * Dish ladder + honesty notes + shop reference (no owned levels — see stats/w7-report.mjs).
 * ============================================================================================ */
function renderSushi() {
  const ladder = Array.from({ length: SU.dishesTotal }, (_, i) =>
    `<span class="${i < SU.dishesUnlocked ? "got" : ""}" title="dish tier ${i + 1}">${i + 1}</span>`).join("");
  const shopRows = (GLOSS?.sushiShop ?? []).map((r) => `<tr>
      <td><b>${r.name}</b><div class="where">${r.desc}</div></td>
      <td style="text-align:right">${r.maxLv >= 9999 ? "∞" : r.maxLv}</td>
    </tr>`).join("");
  $("sushiPanel").style.display = "";
  $("sushiPanel").innerHTML = `
    <h2>${UI.sprite("Sushi1", 20, "data")} Dishes <span class="hint">UniqueSushi = the number of dish tiers unlocked IN A LEADING CONSECUTIVE RUN from tier 1 — every Rift-of-Gods slot and knowledge/dish mechanic keys off this count.</span></h2>
    <div class="dishladder">${ladder}</div>
    <div class="caveat" style="margin-top:12px">Fuel, Shaker charges, and Knowledge queue state are runtime UI values the client keeps in memory, not written to the save — this page honestly shows them as "not in save" rather than a stale or guessed number. Check the in-game Sushi Station directly for those.</div>
    <details class="fold" style="margin-top:10px"><summary>Shop upgrades — 45-row reference (names/max levels only, no owned levels)</summary>
      <p class="note" style="margin:6px 0">entities.w7.sushi currently exposes an aggregate "shop upgrades bought" COUNT only, not a per-upgrade level array — so this table lists what's BUYABLE, not what YOU own. Adding a per-upgrade level list to the Sushi entity (reading Sushi[2]) is a clean follow-up pass.</p>
      <div class="scroll"><table><tr><th>Upgrade</th><th style="text-align:right">Max level</th></tr>${shopRows}</table></div>
    </details>
  `;
}

/* ============================================================================================
 * sushiRoG recipe embed — same term-rendering pattern as legends.html's legendTalents module:
 * account-wide, format "points" (a monotonic progress index, not one meaningful unit).
 * ============================================================================================ */
function bucketTerms(r) {
  const isNeutral = (t) => t.kind === "add" && t.value === 0;
  const locked = r.terms.filter((t) => isNeutral(t) && t.status !== "unknown");
  const lockedSet = new Set(locked);
  const rest = r.terms.filter((t) => !lockedSet.has(t)).sort((a, b) => (b.value || 0) - (a.value || 0));
  return { rest, locked };
}
function termRow(t, disp) {
  const d = disp[t.id] || {};
  const key = `stat.sushiRoG.${t.id}`;
  return `<tr>
      <td style="max-width:400px"><b>${d.label || t.key}</b>${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
      <td style="text-align:right">+${fmt(t.value)}</td>
      <td>${chip(t.status)}</td>
      <td>${spark(key)}</td>
      <td class="note">${d.how || t.note || ""}</td>
    </tr>`;
}
function lockedRow(t, disp) {
  const d = disp[t.id] || {};
  return `<tr class="dim">
    <td style="max-width:400px"><b>${d.label || t.key}</b>${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
    <td style="text-align:right">—</td>
    <td><span class="chip dead">locked</span></td>
    <td></td>
    <td class="note">Not yet unlocked — needs a higher dish tier (see the dish ladder above).</td>
  </tr>`;
}
function renderModule() {
  const host = $("rmod_sushiRoG");
  const st = DATA?.stats?.sushiRoG;
  if (!host) return;
  if (!st) {
    host.innerHTML = `<section class="panel pending"><h2>Sushi Rift-of-Gods recipe <span class="pill-pending">recipe pending</span></h2>
      <p class="note">Sync a save with a stored raw snapshot to unlock the full per-slot breakdown + history below.</p></section>`;
    return;
  }
  const r = st.collapsed;
  const disp = st.display || {};
  const { rest, locked } = bucketTerms(r);
  const rows = SHOWALLMOD ? rest : rest.slice(0, 12);
  host.innerHTML = `<section class="panel" id="mod_sushiRoG">
    <h2>${UI.sprite("Sushi1", 20, "data")} Rift of Gods — Full Breakdown &amp; History <span class="hint">Each of the 59 RoG slots unlocks in order as UniqueSushi rises — every unlocked slot is an independent account-wide bonus feeding a DIFFERENT system.</span></h2>
    <div class="cards" style="margin-bottom:10px">
      <div class="tile"><div class="label">Progress index</div><div class="value">${fmt(r.value)} pts</div><div class="sub">sum of all unlocked slot values — not one meaningful unit</div></div>
      <div class="tile"><div class="label">Slots unlocked</div><div class="value">${r.terms.length - locked.length}<span class="of">/${r.terms.length}</span></div></div>
    </div>
    <div class="scroll"><table>
      <tr><th>Slot</th><th style="text-align:right">Value</th><th>Status</th><th>History</th><th>How it works</th></tr>
      ${rows.map((t) => termRow(t, disp)).join("")}
    </table></div>
    ${rest.length > 12 ? `<button class="showmore" id="modShowMore">${SHOWALLMOD ? "show fewer" : `show ${rest.length - 12} more`}</button>` : ""}
    ${locked.length ? `<details class="fold" style="margin-top:6px"><summary>${locked.length} locked slot${locked.length > 1 ? "s" : ""} (higher dish tier needed)</summary>
      <div class="scroll"><table>${locked.map((t) => lockedRow(t, disp)).join("")}</table></div>
    </details>` : ""}
  </section>`;
  const more = $("modShowMore");
  if (more) more.onclick = () => { SHOWALLMOD = !SHOWALLMOD; renderModule(); };
}

async function loadHistory() {
  const st = DATA?.stats?.sushiRoG;
  if (!st) return;
  const keys = ["stat.sushiRoG"];
  for (const t of st.collapsed.terms) if (t.status !== "unknown") keys.push(`stat.sushiRoG.${t.id}`);
  try {
    const res = await fetch(`/api/history?keys=${keys.join(",")}`);
    SERIES = (await res.json()).series || {};
  } catch { SERIES = {}; }
}

/* ============================================================================================
 * Boot.
 * ============================================================================================ */
async function boot() {
  try {
    const stateRes = await fetch("/api/state");
    const state = await stateRes.json();
    if (!state.snapshot) { $("err").textContent = "No snapshot yet — Sync on the dashboard first."; return; }
    SNAP = state.snapshot;
    $("meta").textContent = new Date(SNAP.ts).toLocaleString();
    if (!SNAP.entities?.w7) {
      $("err").innerHTML = `No <code>w7</code> entity on this snapshot — run <b>POST /api/rebuild</b>, then reload.`;
      return;
    }
    SU = SNAP.entities.w7.sushi;

    const [statsRes, glossRes] = await Promise.all([fetch("/api/stats"), fetch("/api/w7")]);
    const statsJson = await statsRes.json();
    DATA = statsJson.ok && statsJson.stats ? statsJson : null;
    const glossJson = await glossRes.json().catch(() => null);
    GLOSS = glossJson?.ok ? glossJson : null;
    if (!DATA) $("err").textContent = "No snapshot with a stored raw save yet — Sync first to unlock the recipe breakdown below.";

    renderTiles();
    renderSushi();
    renderModule();
    await loadHistory();
    renderModule();
  } catch (e) { $("err").textContent = "Server error: " + e.message + " — is the companion server running?"; }
}
boot();
</script>
</body>
</html>
