<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamps — IdleOn Companion</title>
<link rel="stylesheet" href="companion.css">
<script src="ui.js"></script>
<style>
  td { vertical-align: top; white-space: normal; }
  .note { color: var(--ink-2); white-space: normal; max-width: 560px; font-size: 12px; }
</style>
</head>
<body>
<header class="app">
  <h1><img class="px" src="/public/assets/data/UIstampB.png" alt="" width="26" height="26">Stamps</h1>
  <nav class="pages"></nav>
  <span class="spacer"></span>
  <span class="meta" id="meta"></span>
  <span id="uiOptions"></span>
</header>

<div id="err" class="err"></div>
<div class="cards" id="tiles"></div>

<section class="panel" id="stampsPanel" style="display:none"></section>

<script>
const $ = (id) => document.getElementById(id);
let SNAP = null;    // /api/state snapshot

/* ---------- Stamps module state ---------- */
let STAMP_TAB = 0;              // 0 combat, 1 skills, 2 misc
let STAMP_GOAL = "cheap";       // "cheap" | "growth"
let STAMP_SHOWALL = { 0: false, 1: false, 2: false };
const STAMP_TABS = [["Combat", 0], ["Skills", 1], ["Misc", 2]];

const fmt = (n) => {
  if (n == null || !isFinite(n)) return "—";
  const a = Math.abs(n);
  if (a >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (a >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (a >= 1e4) return Math.round(n).toLocaleString();
  return +n.toFixed(2) + "";
};

/* "CraftMat1" -> "Craft Mat 1", "OakTree" -> "Oak Tree" — item raw names from gamedata
 * are camelCase with no separators; stamp/anvil display names use "_" instead, handled by
 * a plain replace. Both funnel through this before hitting the page. */
const niceItem = (s) => String(s ?? "")
  .replace(/_/g, " ")
  .replace(/([a-z])([A-Z])/g, "$1 $2")
  .replace(/([A-Za-z])(\d)/g, "$1 $2")
  .trim();

/* ============================================================================================
 * Stamps (flagship): per-tab table, goal selector, no "afford" flag (see note below).
 * ============================================================================================ */
function stampEffectText(r) {
  return String(r.effect ?? "").replace(/\{\}/g, "").replace(/_/g, " ").replace(/\s+/g, " ").trim();
}

function stampRows() {
  return ((SNAP.entities.w1 && SNAP.entities.w1.stamps) || []).filter((s) => s.tab === STAMP_TAB);
}

function sortedStampRows() {
  const rows = stampRows().slice();
  if (STAMP_GOAL === "cheap") {
    rows.sort((a, b) => (a.nextGoldCost ?? a.nextMatCost ?? Infinity) - (b.nextGoldCost ?? b.nextMatCost ?? Infinity));
  } else {
    // "Biggest bonus growth": most stamp bonuses grow roughly linearly (or decay toward an
    // asymptote) with level, so the LOWEST-level stamps get the biggest proportional jump from
    // their next level — ranking by level ascending is a level-only proxy for that, since the
    // per-level bonus magnitude itself isn't in the parsed save (see the (i) tooltip).
    rows.sort((a, b) => a.level - b.level);
  }
  return rows;
}

function stampRowHtml(r) {
  const inMat = r.nextGoldCost == null;
  const costHtml = inMat
    ? `${fmt(r.nextMatCost)}× ${niceItem(r.matItem)}`
    : `${fmt(r.nextGoldCost)} gold`;
  const barPct = r.maxLevel > 0 ? Math.max(0, Math.min(100, (r.level / r.maxLevel) * 100)) : 100;
  return `<tr>
    <td><b>${niceItem(r.name)}</b></td>
    <td>Lv ${r.level}${inMat
      ? '<div class="note">buying with materials now</div>'
      : `<div class="bar-bg" style="margin-top:3px"><div class="bar-fill" style="width:${barPct}%"></div></div>`}</td>
    <td class="note">${stampEffectText(r)}</td>
    <td style="text-align:right">${costHtml}</td>
  </tr>`;
}

function renderStamps() {
  const w1 = SNAP.entities.w1 || {};
  const stamps = w1.stamps || [];
  if (!stamps.length) {
    $("stampsPanel").style.display = "";
    $("stampsPanel").innerHTML = `<h2>Stamps</h2><p class="note">No stamp data on this snapshot.</p>`;
    return;
  }
  const gilded = stamps.some((s) => s.gilded);
  const rowsAll = sortedStampRows();
  const showAll = !!STAMP_SHOWALL[STAMP_TAB];
  const rows = showAll ? rowsAll : rowsAll.slice(0, 12);
  const goalNote = STAMP_GOAL === "cheap"
    ? "Sorted by the coin or material amount your next level costs — cheapest first."
    : "Sorted by current level, ascending — lower-level stamps get the biggest proportional bonus jump from their next level.";

  $("stampsPanel").style.display = "";
  $("stampsPanel").innerHTML = `
    <h2>Stamps <span class="hint">Level, next-upgrade cost, and effect for every stamp you've collected.</span>
      <span style="flex:1"></span>
      <select class="inlinesel" id="stampGoal">
        <option value="cheap" ${STAMP_GOAL === "cheap" ? "selected" : ""}>Cheapest next levels</option>
        <option value="growth" ${STAMP_GOAL === "growth" ? "selected" : ""}>Biggest bonus growth</option>
      </select>
    </h2>
    ${gilded ? `<div class="chips"><span class="chip live">Gilded stamps active — upgrade costs cut across the board</span></div>` : ""}
    <div class="tabs" id="stampTabs">
      ${STAMP_TABS.map(([label, i]) => `<button class="f${STAMP_TAB === i ? " active" : ""}" data-tab="${i}">${label}</button>`).join("")}
    </div>
    <div class="caveat">Coins and materials on hand aren't in the parsed save yet, so these are costs to plan around — not "can afford right now" checks.</div>
    <p class="note">${goalNote}</p>
    <div class="scroll"><table>
      <tr><th>Stamp</th><th>Level</th><th>Effect</th><th style="text-align:right">Next cost</th></tr>
      ${rows.map(stampRowHtml).join("")}
    </table></div>
    ${rowsAll.length > 12 ? `<button class="showmore" id="stampShowMore">${showAll ? "show fewer" : `show ${rowsAll.length - 12} more`}</button>` : ""}
  `;
  wireStamps();
}

function wireStamps() {
  const goalSel = $("stampGoal");
  if (goalSel) goalSel.onchange = (e) => { STAMP_GOAL = e.target.value; renderStamps(); };
  document.querySelectorAll("#stampTabs button").forEach((b) => b.onclick = () => {
    STAMP_TAB = Number(b.dataset.tab); renderStamps();
  });
  const more = $("stampShowMore");
  if (more) more.onclick = () => { STAMP_SHOWALL[STAMP_TAB] = !STAMP_SHOWALL[STAMP_TAB]; renderStamps(); };
}

/* ============================================================================================
 * Top KPI strip.
 * ============================================================================================ */
function renderTiles() {
  const w1 = SNAP.entities.w1 || {};
  const stamps = w1.stamps || [];
  const stampsLeveled = stamps.filter((s) => s.level > 0).length;

  $("tiles").innerHTML = `
    <div class="tile">${UI.sprite("UIstampB", 28, "data")}<div class="label">Stamps leveled</div><div class="value">${stampsLeveled}<span class="of">/${stamps.length || 125}</span></div><div class="sub">${stamps.some((s) => s.gilded) ? "gilded — upgrade costs cut" : "levels are account-wide"}</div></div>
  `;
}

/* ============================================================================================
 * Boot.
 * ============================================================================================ */
async function boot() {
  try {
    const stateRes = await fetch("/api/state");
    const state = await stateRes.json();
    if (!state.snapshot) { $("err").textContent = "No snapshot yet — Sync on the dashboard first."; return; }
    SNAP = state.snapshot;
    $("meta").textContent = new Date(SNAP.ts).toLocaleString();
    if (!SNAP.entities?.w1) {
      $("err").innerHTML = `No <code>w1</code> entity on this snapshot — run <b>POST /api/rebuild</b>, then reload.`;
      return;
    }

    renderTiles();
    renderStamps();
  } catch (e) { $("err").textContent = "Server error: " + e.message + " — is the companion server running?"; }
}
boot();
</script>
</body>
</html>
