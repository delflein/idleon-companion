<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing — IdleOn Companion</title>
<style>
  :root {
    color-scheme: dark;
    --surface-1: #1a1a19; --page: #0d0d0d;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-muted: #898781;
    --grid: #2c2c2a; --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink-1: #0b0b0b; --ink-2: #52514e; --ink-muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --series-1: #2a78d6;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.45; padding: 20px; max-width: 1240px; margin: 0 auto;
  }
  header { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
  header h1 { font-size: 21px; font-weight: 650; }
  header .meta { color: var(--ink-muted); font-size: 12.5px; }
  header .spacer { flex:1; }
  nav.pages { display:flex; gap:2px; border:1px solid var(--border); border-radius:10px; padding:2px; }
  nav.pages a { color:var(--ink-2); text-decoration:none; font-size:12.5px; padding:4px 12px; border-radius:8px; }
  nav.pages a.here { background:var(--series-1); color:#fff; }
  nav.pages a:hover:not(.here) { background:var(--grid); }
  .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap:10px; margin-bottom:14px; }
  .tile { background: var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
  .tile .label { color: var(--ink-muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; }
  .tile .value { font-size:24px; font-weight:650; margin-top:2px; }
  .tile .sub { color: var(--ink-2); font-size:12px; margin-top:2px; }
  section.panel { background: var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px; }
  section.panel h2 { font-size:14.5px; font-weight:650; margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  section.panel h2 .hint { font-weight:400; color:var(--ink-muted); font-size:11.5px; }
  table { width:100%; border-collapse:collapse; font-variant-numeric: tabular-nums; font-size:12.5px; }
  th { text-align:left; color:var(--ink-muted); font-weight:500; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; padding:0 8px 6px 0; white-space:nowrap; }
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--ink-1); }
  td { padding:5px 8px 5px 0; border-top:1px solid var(--grid); white-space:nowrap; }
  tr.dim td { color:var(--ink-muted); }
  tr.pick td { background:rgba(57,135,229,.09); }
  .chip { font-size:11px; border:1px solid var(--border); border-radius:6px; padding:1px 6px; color:var(--ink-2); }
  .chip.dead { color:var(--ink-muted); text-decoration:line-through; opacity:.6; }
  .chip.live { border-color:var(--good); color:var(--good); }
  .chip.soon { border-color:var(--warning); color:var(--warning); }
  .rec { border-left:3px solid var(--series-1); padding:3px 0 3px 11px; margin:2px 0 10px; font-size:13px; }
  .rec.none { border-left-color:var(--baseline); color:var(--ink-muted); }
  .rec b { color:var(--ink-1); }
  select { background:var(--page); color:var(--ink-1); border:1px solid var(--border); border-radius:7px; padding:3px 8px; font:inherit; font-size:12.5px; }
  .err { color:var(--critical); }
  .scroll { overflow-x:auto; }
  .caveat { border-left:3px solid var(--warning); background:rgba(250,178,25,.06); padding:8px 11px; border-radius:0 8px 8px 0; margin-bottom:14px; font-size:12.5px; color:var(--ink-2); }
  .caveat:empty { display:none; }
  .caveat code { color:var(--ink-1); font-size:11.5px; }
  .up { color:var(--good); } .down { color:var(--ink-muted); }
</style>
</head>
<body>
<header>
  <h1>Sailing</h1>
  <nav class="pages">
    <a href="dashboard.html">Dashboard</a>
    <a href="achievements.html">Achievements</a>
    <a class="here" href="sailing.html">Sailing</a>
  </nav>
  <span class="spacer"></span>
  <span class="meta" id="meta"></span>
</header>

<div id="err" class="err"></div>
<div id="caveat" class="caveat"></div>
<div class="cards" id="tiles"></div>
<section class="panel" id="islandPanel" style="display:none"></section>
<section class="panel" id="shopPanel" style="display:none"></section>
<section class="panel" id="fleetPanel" style="display:none"></section>
<section class="panel" id="sourcePanel" style="display:none"></section>

<script>
const $ = (id) => document.getElementById(id);
const int = (n) => Math.round(n).toLocaleString();
/* When the artifact multiplier is a LOWER bound (terms we couldn't derive contribute their
 * neutral element), the real chance is >= computed, so the real "1 in N" is <= N. Render the
 * bound rather than a bare number: a floor must never read as a fact. */
let LOWER = false;
const oneIn = (p) => p > 0 ? (LOWER ? "≤ 1 in " : "1 in ") + int(1/p) : "—";

const CHEST = [
  {name:"Basic",   arti:1.0},   {name:"Iron",    arti:1.4},
  {name:"Gilded",  arti:1.96},  {name:"Noble",   arti:2.744},
  {name:"Occult",  arti:3.8416},{name:"Miracle", arti:30},
];
const STAT = ["Boat Speed","Loot Value","Cloud Discover","Artifact Find","Rare Chest"];

/* Stat value is phase-dependent, not fixed. The old community ranking
 * (Boat Speed > Loot Value > Artifact Find > Rare Chest > Cloud) predates Transcended
 * artifacts and no longer describes the endgame.
 *   speed    — still distance-bound: Boat Speed buys real trips/hour
 *   artifact — clamped at min travel time, artifacts outstanding: Rare Chest then Artifact Find
 *   loot     — everything maxed: artifact-find is dead, Loot Value levels the ships
 * Cloud Discover is never worth a slot at any phase. */
const RANK = {
  speed:    [0, 1, 4, 3, 2],
  artifact: [4, 3, 1, 0, 2],
  loot:     [1, 0, 4, 3, 2],
};
const LIVE = { speed: [0,1], artifact: [4,3], loot: [1] };

let SNAP = null, ISLAND = null;
let SORT = { col: "boat", dir: 1 };   // boat order by default — the order they appear in-game

/* The game labels captains with letters, not indices: 0=A, 1=B, ... 25=Z, 26=AA. */
function capLabel(i) {
  let s = "", n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

function statChip(s, phase) {
  const live = LIVE[phase].includes(s.id);
  return `<span class="chip ${live?"live":"dead"}">${STAT[s.id]} +${s.raw}</span>`;
}

/* Chance one chest yields >= 1 artifact: the client rolls each un-maxed artifact on the
 * island independently against the same frozen chest value. */
const chanceFor = (multi, isl) =>
  isl.unmaxed ? Math.min(1, 1 - Math.pow(1 - multi/isl.divisor, isl.unmaxed)) : 0;

/* A boat's multiplier = the number the game shows (a captain-less boat) scaled by that
 * boat's own Artifact Find captain roll. */
const boatMulti = (s, b) => s.baseMulti * (100 + s.additivePoolPct + b.artifactFind) / (100 + s.additivePoolPct);

/* Expected artifacts per chest for a boat on an island, across its rarity distribution. */
const boatRate = (s, b, isl) =>
  b.chestDist.reduce((t, p, r) => t + p * chanceFor(boatMulti(s, b) * CHEST[r].arti, isl), 0);

function render() {
  const s = SNAP.entities?.sailing;
  if (!s) { $("err").innerHTML = `No <code>sailing</code> entity — run <b>POST /api/rebuild</b>, then reload.`; return; }
  /* s.baseMulti now arrives COMPUTED from domain.mjs (artifactchance.mjs evaluates the client's
   * ~28-term BoatArtiMulti against the save). It used to be hardcoded to one account's in-game
   * reading, which was wrong for everybody else. Older snapshots predate the field — rebuild
   * rather than silently falling back to a constant. */
  if (!s.baseMulti) { $("err").innerHTML = `This snapshot has no computed <code>baseMulti</code> — run <b>POST /api/rebuild</b>, then reload.`; return; }
  LOWER = !!s.artiLowerBound;
  $("meta").textContent = new Date(SNAP.ts).toLocaleString();

  const cur = s.islands.find(i => i.i === s.boats[0]?.island) || s.islands[0];
  if (ISLAND === null) ISLAND = cur.i;
  const sel = s.islands.find(i => i.i === ISLAND);
  const live = s.islands.filter(i => i.unmaxed > 0);
  const fleetOn = (isl) => s.boats.reduce((t,b) => t + boatRate(s,b,isl), 0);

  const fmtMulti = (v) => v >= 1e6 ? (v/1e6).toFixed(2)+"M×" : Math.round(v).toLocaleString()+"×";
  $("tiles").innerHTML = [
    ["Banked sailing", s.bankedHours.toFixed(2)+" h", "advances every boat on claim"],
    ["Chest pile", s.chests, s.chests===0 ? "empty — boats at sea" : "waiting"],
    ["Artifacts maxed", s.artifactsMaxed+" / "+(s.artifactsMaxed+s.artifactsRemaining), s.artifactsRemaining+" to go"],
    ["Rare Chest boats", s.boatsWithRareChest+" / "+s.boats.length, s.boatsDeadForArtifacts+" dead for artifacts"],
    ["Artifact find", (s.artiLowerBound?"≥ ":"")+fmtMulti(s.baseMulti),
      s.artiLowerBound ? `${s.artiUnknown.length} term(s) unknown — real value is higher` : "computed from save"],
  ].map(([l,v,sub]) => `<div class="tile"><div class="label">${l}</div><div class="value">${v}</div><div class="sub">${sub}</div></div>`).join("");

  /* The absolute "1 in X" numbers below inherit two things the save cannot tell us: the
   * calibrated Firebase server vars, and any BoatArtiMulti term we could not compute. Ratios
   * between islands/boats/captains are unaffected. Say so instead of implying false precision. */
  $("caveat").innerHTML = s.artiLowerBound
    ? `<b>The "1 in N" columns are a FLOOR, not a value — and possibly a distant one.</b>
       ${s.artiUnknown.length} artifact-find term(s) can't be derived from the save
       (${s.artiUnknown.slice(0,3).map(u=>`<code>${u.split(" —")[0].split(" [")[0]}</code>`).join(", ")}${s.artiUnknown.length>3?", …":""}),
       so each contributes its neutral value and your real chance is <b>better than shown</b> —
       on a maxed account by as much as ~50×. The island divisors also depend on Firebase server
       vars that are calibrated, not read. <b>Rankings and × comparisons are unaffected</b>
       (every missing term is a global multiplier and cancels out of a ratio) —
       <b>trust those, not the absolute odds.</b>`
    : "";

  /* islands */
  const best = [...live].sort((a,b)=> fleetOn(b)-fleetOn(a))[0];
  $("islandPanel").style.display = "";
  $("islandPanel").innerHTML = `
    <h2>Islands <span class="hint">rolls per chest × divisor</span></h2>
    ${best && best.i !== cur.i
      ? `<div class="rec">Move all boats to <b>island ${best.i}</b> — <b class="up">${(fleetOn(best)/fleetOn(cur)).toFixed(2)}×</b> your rate on island ${cur.i}.</div>`
      : `<div class="rec none">Island ${cur.i} is already your best.</div>`}
    <div class="scroll"><table>
      <tr><th>island</th><th>un-maxed</th><th>basic chest</th><th>vs current</th><th>artifacts</th></tr>
      ${live.map(i=>{
        const rel = fleetOn(i)/fleetOn(cur);
        return `<tr class="${i.i===cur.i?"pick":(rel<1?"dim":"")}">
          <td>${i.i}${i.i===cur.i?" ·":""}</td>
          <td>${i.unmaxed} / ${i.count}</td>
          <td>${oneIn(chanceFor(s.baseMulti, i))}</td>
          <td class="${rel>1?"up":"down"}">${rel.toFixed(2)}×</td>
          <td>${i.artifacts.filter(a=>a.tier<6).map(a=>`<span class="chip">${a.name}</span>`).join(" ")}</td>
        </tr>`;
      }).join("")}
    </table></div>`;

  /* Shop captains arrive at level 1, and effect = level × storedRoll. Scoring them as they
   * stand ranks every roll at its worst moment and buries good ones. The stored roll never
   * changes, so project to CAP_LV to judge the roll itself, and show today's number too —
   * a swap can be negative now and still correct. */
  const CAP_LV = 20;
  const atLevel = (c, lv) => ({
    rareChest:    c.stats.reduce((t,x)=> t + (x.id===4 ? lv*x.raw : 0), 0),
    artifactFind: c.stats.reduce((t,x)=> t + (x.id===3 ? lv*x.raw : 0), 0),
  });
  const rateWith = (v, isl) => chestDistFor(v.rareChest, s.arrowheadBonus)
    .reduce((t,p,r)=> t + p * chanceFor(s.baseMulti*(100+s.additivePoolPct+v.artifactFind)/(100+s.additivePoolPct)*CHEST[r].arti, isl), 0);

  const swaps = [];
  for (const c of s.shop) for (const b of s.boats) {
    const now  = rateWith(atLevel(c, c.level), sel) - boatRate(s,b,sel);
    const late = rateWith(atLevel(c, CAP_LV), sel) - boatRate(s,b,sel);
    swaps.push({ c, b, now, late });
  }
  swaps.sort((a,b)=> b.late - a.late);     // judge the roll, not its current level
  const top = swaps[0];
  const fleetNow = fleetOn(sel);
  $("shopPanel").style.display = "";
  $("shopPanel").innerHTML = `
    <h2>Captain shop</h2>
    ${top && top.late > 0
      ? `<div class="rec">Buy the <b>tier ${top.c.tier}</b> roll (${top.c.stats.filter(x=>LIVE[s.phase].includes(x.id)).map(x=>STAT[x.id]+" +"+x.raw).join(", ")||"—"})
         and replace <b>captain ${capLabel(top.b.captainIdx)} on boat ${top.b.i}</b> —
         <b class="${top.now>=0?"up":"down"}">${top.now>=0?"+":""}${(top.now/fleetNow*100).toFixed(2)}%</b> now,
         <b class="up">+${(top.late/fleetNow*100).toFixed(2)}%</b> at lv${CAP_LV}.</div>`
      : `<div class="rec none">Nothing worth buying — no roll beats a captain you already have, even levelled.</div>`}
    <div class="scroll"><table>
      <tr><th>tier</th><th>lv</th><th>stats</th><th>replaces</th><th>now</th><th>at lv${CAP_LV}</th></tr>
      ${s.shop.map(c=>{
        const bestFor = swaps.filter(x=>x.c===c)[0];
        const good = bestFor && bestFor.late>0;
        return `<tr class="${good?"":"dim"}">
          <td>${c.tier}</td><td>${c.level}</td>
          <td>${c.stats.map(x=>statChip(x, s.phase)).join(" ")}</td>
          <td>${good ? `cap ${capLabel(bestFor.b.captainIdx)} · boat ${bestFor.b.i}` : "—"}</td>
          <td class="${good && bestFor.now>=0?"up":"down"}">${good ? (bestFor.now>=0?"+":"")+(bestFor.now/fleetNow*100).toFixed(2)+"%" : "—"}</td>
          <td class="${good?"up":""}">${good ? "+"+(bestFor.late/fleetNow*100).toFixed(2)+"%" : "—"}</td>
        </tr>`;
      }).join("")}
    </table></div>`;

  /* fleet — per-tier chance on the selected island.
   * Chance columns sort by the displayed "1 in N", so ascending = best first. */
  const rows = s.boats.map(b => {
    const c = s.captains.find(x=>x.i===b.captainIdx) || { tier:0, level:0, stats:[] };
    const m = boatMulti(s,b);
    return {
      b, c, m,
      tiers: CHEST.slice(0,5).map(ct => chanceFor(m*ct.arti, sel)),
      rate: boatRate(s,b,sel),
    };
  });
  const COLS = [
    { k:"boat",  t:"boat",      get:r=>r.b.i },
    { k:"cap",   t:"cap",       get:r=>r.b.captainIdx },
    { k:"tier",  t:"tier",      get:r=>r.c.tier },
    { k:"lv",    t:"lv",        get:r=>r.c.level },
    { k:"stats", t:"stats",     get:null },
    ...CHEST.slice(0,5).map((ct,i)=>({ k:"t"+i, t:ct.name, get:r=> r.tiers[i]>0 ? 1/r.tiers[i] : Infinity })),
    { k:"rate",  t:"per chest", get:r=> r.rate>0 ? 1/r.rate : Infinity },
  ];
  const sc = COLS.find(c=>c.k===SORT.col) || COLS[0];
  rows.sort((x,y)=> (sc.get(x) - sc.get(y)) * SORT.dir);

  $("fleetPanel").style.display = "";
  $("fleetPanel").innerHTML = `
    <h2>Fleet
      <span class="hint">chance per chest on</span>
      <select id="islSel">${s.islands.map(i=>`<option value="${i.i}" ${i.i===ISLAND?"selected":""}>island ${i.i}${i.unmaxed?` · ${i.unmaxed} un-maxed`:" · nothing left"}</option>`).join("")}</select>
    </h2>
    <div class="scroll"><table>
      <tr>${COLS.map(c=> c.get
        ? `<th class="sortable" data-col="${c.k}">${c.t}${SORT.col===c.k ? (SORT.dir>0?" ▲":" ▼") : ""}</th>`
        : `<th>${c.t}</th>`).join("")}</tr>
      ${rows.map(r=>`<tr>
        <td>${r.b.i}</td><td>${capLabel(r.b.captainIdx)}</td><td>${r.c.tier}</td><td>${r.c.level}</td>
        <td>${(r.c.stats||[]).map(x=>statChip(x, s.phase)).join(" ")}</td>
        ${r.tiers.map(p=>`<td>${oneIn(p)}</td>`).join("")}
        <td>${oneIn(r.rate)}</td>
      </tr>`).join("")}
    </table></div>`;
  $("islSel").onchange = (ev) => { ISLAND = Number(ev.target.value); render(); };
  for (const th of document.querySelectorAll("#fleetPanel th.sortable")) {
    th.onclick = () => {
      const col = th.dataset.col;
      SORT = { col, dir: SORT.col === col ? -SORT.dir : 1 };
      render();
    };
  }

  renderSources(s);
}

/* Every source feeding BoatArtiMulti, straight from artifactchance.mjs's per-term breakdown.
 * Two groups because the client's expression has two shapes: one additive bracket
 * (1 + sum(add)/100) multiplied by a chain of independent factors. Sorted by impact, so the
 * top row is genuinely where your artifact chance comes from — and the bottom rows are where
 * there's headroom left.
 * Status is shown per row rather than summarised: `unknown` terms sit at their neutral element,
 * so a floor is visible as a floor instead of being asserted in a footnote nobody reads. */
/* Friendly names for terms whose key is a bare client expression. Only names I can actually
 * justify are here — anything not in this map falls back to showing the raw expression, which
 * is ugly but true. Do not invent a label to fill a gap; a wrong name is worse than a formula. */
const SRC_NAME = [
  [/WinBonus/,             "Summoning · winner bonus"],
  [/DaveyJonesBonus/,      "Davey Jones · gem shop"],
  [/Spelunk\[6\]/,         "Spelunking discoveries · 1.02^n"],
  [/PaletteBonus/,         "Gaming · palette"],
  [/PurpleChestSlugsOwned/,"Purple Chest Slug · 1.5^owned"],
  [/Button_Bonuses/,       "The Button"],
  [/KillroyBonuses/,       "Killroy · skull shop"],
  [/VotingBonusz/,         "Summoning · active vote"],
  [/LoreEpiBon/,           "Lore episode"],
  [/RoG_BonusQTY/,         "Sushi"],
  [/ExoticBonusQTY/,       "Farming · exotic"],
  [/Companions\(154\)/,    "Companion 154"],
  [/Companions\(43\)/,     "Companion 43"],
  [/VaultUpgBonus/,        "Summoning · vault upgrade"],
  [/StickerBonus/,         "Sticker"],
  [/NONdummies\[60\]/,     "Tier-6 captains"],
  [/ShinyBonusS/,          "Shiny pets"],
  [/GetBribeBonus/,        "Bribe · Artifact Pilfering"],
  [/FractalIslandBonus/,   "Fractal Island"],
  [/CaptBonusCalc/,        "This boat's captain"],
  [/Grid_Bonus\",109/,     "Research grid · Transcendent Artifacts"],
];
const srcLabel = (key) => {
  for (const [re, name] of SRC_NAME) if (re.test(key)) return name;
  // several keys already carry a trailing human name, e.g. `Sailing(...) Fauxory Tusk`
  const m = key.match(/\)\s+([A-Z][\w' ]+)$/);
  return m ? m[1] : key;
};

function renderSources(s) {
  const terms = s.artiTerms || [];
  if (!terms.length) return;
  const add = terms.filter(t => t.kind === "add");
  const mul = terms.filter(t => t.kind === "mul");
  const pool = add.reduce((t, x) => t + (x.value || 0), 0);

  const tag = (t) => t.status === "computed" ? ""
    : `<span class="chip ${t.status === "partial" ? "soon" : "dead"}">${t.status}</span>`;
  const row = (t, fmtV) => `<tr class="${t.status === "unknown" ? "dim" : ""}">
      <td><b>${srcLabel(t.key)}</b><div style="color:var(--ink-muted);font-size:10.5px">${t.key}</div></td>
      <td style="text-align:right;vertical-align:top">${fmtV(t)}</td>
      <td style="vertical-align:top">${tag(t)}</td>
      <td style="color:var(--ink-2);white-space:normal;vertical-align:top">${t.note || ""}</td>
    </tr>`;

  $("sourcePanel").style.display = "";
  $("sourcePanel").innerHTML = `
    <h2>Artifact find chance sources
      <span class="hint">${s.artiLowerBound ? "≥ " : ""}${fmtMulti(s.baseMulti)} total · ${terms.length} terms</span>
    </h2>
    <div class="scroll"><table>
      <tr><th colspan="4">Additive pool → ×${(1 + pool/100).toFixed(2)} &nbsp;<span style="text-transform:none;font-weight:400">(1 + ${Math.round(pool).toLocaleString()}% / 100)</span></th></tr>
      ${[...add].sort((a,b)=>(b.value||0)-(a.value||0)).map(t => row(t, x => "+" + Math.round(x.value||0).toLocaleString() + "%")).join("")}
    </table></div>
    <div class="scroll" style="margin-top:14px"><table>
      <tr><th colspan="4">Multiplicative</th></tr>
      ${[...mul].sort((a,b)=>(b.value||1)-(a.value||1)).map(t => row(t, x => "×" + (+(x.value||1)).toFixed(2))).join("")}
    </table></div>`;
}

/* mirrors domain.mjs chestDist(): roll = U(0,1)/divisor, nested thresholds.
 * Verified against N.js _customBlock_AddChest — the old values here (0.25/0.05/0.007/3e-4/1e-6)
 * were all wrong. Keep in sync with REF.chestTiers. */
const TH = [1.0, 0.2, 0.04, 0.006, 2.3e-4, 1e-8];
function chestDistFor(rareChest, arrowhead) {
  const d = 1 + (rareChest + arrowhead) / 200;
  const cum = TH.map(t => Math.min(1, t*d));
  return cum.map((c,r) => c - (cum[r+1] ?? 0));
}

(async () => {
  try {
    const r = await (await fetch("/api/state")).json();
    if (!r.snapshot) { $("err").textContent = "No snapshot yet — Sync on the dashboard first."; return; }
    SNAP = r.snapshot; render();
  } catch (e) { $("err").textContent = "Failed to load /api/state: " + e.message; }
})();
</script>
</body>
</html>
