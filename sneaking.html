<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaking — IdleOn Companion</title>
<link rel="stylesheet" href="companion.css">
<script src="ui.js"></script>
<style>
  /* Shared with w1-w5.html / summoning.html — the generic recipe-breakdown renderer's own look. */
  td { vertical-align: top; white-space: normal; }
  tr.expander { cursor: pointer; }
  tr.expander:hover td { background: var(--glow); }
  tr.parts td { border-bottom: none; padding-top: 0; }
  .partrow { color: var(--ink-2); font-size: 12px; padding-left: 18px; border-left: 2px solid var(--grid); margin: 1px 0; }
  .note { color: var(--ink-2); white-space: normal; max-width: 560px; font-size: 12px; }
  .expr { color: var(--ink-muted); font-size: 10.5px; white-space: normal; font-weight: 400; }
  .where { color: var(--accent); font-size: 11.5px; margin-top: 1px; font-weight: 600; }
  .showmore { background: none; border: none; color: var(--accent); cursor: pointer; font: inherit; font-weight: 650; padding: 6px 0; }
  select.inlinesel { font-size: 12px; }
  .lowerbound { border-left: 3px solid var(--warning); background: rgba(250, 178, 25, .06); padding: 6px 10px; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  details.fold > summary { cursor: pointer; color: var(--accent); font-weight: 650; font-size: 13px; padding: 4px 0; }
  ul.unknowns { margin: 4px 0 0 18px; color: var(--ink-2); font-size: 12.5px; }
  ul.unknowns li { margin-bottom: 3px; }
  .tip { cursor: help; color: var(--accent); font-weight: 700; border-bottom: 1px dotted var(--accent); }
  .subhead { font-size: 13px; margin: 4px 0 8px; }
  tr.dim td { opacity: .6; }
</style>
</head>
<body>
<header class="app">
  <h1><img class="px" src="/idleon-toolbox/public/etc/Sneaking_Ninja.png" alt="" width="26" height="26">Sneaking</h1>
  <nav class="pages"></nav>
  <span class="spacer"></span>
  <span class="meta" id="meta"></span>
  <span id="uiOptions"></span>
</header>

<div id="err" class="err"></div>
<div class="cards" id="tiles"></div>

<section class="panel" id="stealthTablePanel" style="display:none"></section>
<div id="rmod_stealth"></div>

<section class="panel" id="emporiumPanel" style="display:none"></section>
<section class="panel" id="charmsPanel" style="display:none"></section>
<section class="panel" id="gemstonesPanel" style="display:none"></section>

<script>
const $ = (id) => document.getElementById(id);
let SNAP = null, DATA = null, GLOSS = null, SERIES = {};
let SNK = null;   // SNAP.entities.w6.sneaking shortcut
let CHARSEL = {}, SHOWALL = {};
let EMPORIUM_SHOWALL = false, CHARMS_SHOWALL = false;

const fmt = (n) => {
  if (n == null || !isFinite(n)) return "—";
  const a = Math.abs(n);
  if (a >= 1e15) return n.toExponential(2).replace("e+", "e");
  if (a >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (a >= 1e4) return Math.round(n).toLocaleString();
  return +n.toFixed(2) + "";
};
function charName(i) { return SNAP?.charNames?.[i] ?? ("char " + i); }
const chip = (status) => status === "computed" ? "" :
  `<span class="chip ${status === "partial" ? "soon" : status === "user-supplied" ? "user" : status === "per-char" ? "pc" : "dead"}">${status}</span>`;

function spark(key) {
  const pts = SERIES[key];
  if (!pts || pts.length < 2) return "";
  const w = 72, h = 18;
  const vs = pts.map((p) => p.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const y = (v) => max === min ? h / 2 : h - 2 - (v - min) / (max - min) * (h - 4);
  const step = w / (pts.length - 1);
  const d = vs.map((v, i) => `${(i * step).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const up = vs[vs.length - 1] > vs[0];
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${d}" fill="none"
    stroke="${up ? "var(--good)" : "var(--ink-muted)"}" stroke-width="1.5"/></svg>`;
}

/* ============================================================================================
 * Top KPI strip.
 * ============================================================================================ */
function renderTiles() {
  const s = SNK;
  $("tiles").innerHTML = `
    <div class="tile">${UI.sprite("Sneaking_Ninja", 28, "etc")}<div class="label">Ninja Mastery</div><div class="value">${fmt(s.ninjaMastery)}</div><div class="sub">selected mastery: ${fmt(s.selectedMastery)}</div></div>
    <div class="tile"><div class="label">Stealth (best twin)</div><div class="value">${(s.stealthLowerBound ? "≥ " : "") + fmt(s.stealthBest)}</div><div class="sub"><a href="#mod_stealth">full breakdown ↓</a></div></div>
    <div class="tile">${UI.sprite("jade_coin", 28, "etc")}<div class="label">Jade Emporium</div><div class="value">${s.emporium.owned}<span class="of">/${s.emporium.total}</span></div><div class="sub">${s.emporium.unknown ? `${s.emporium.unknown} unreadable` : "unlocks bought"}</div></div>
    <div class="tile"><div class="label">Pristine charms</div><div class="value">${s.charms.owned}<span class="of">/${s.charms.total}</span></div><div class="sub">${fmt(s.gacha.pristineRollsRemaining)} pristine rolls left</div></div>
  `;
}

/* ============================================================================================
 * Per-twin Stealth table + stealth recipe embed (per-character, byChar selector built into the
 * generic renderer below).
 * ============================================================================================ */
function stealthRowHtml(c) {
  return `<tr>
    <td><b>${charName(c.charIdx)}</b></td>
    <td style="text-align:right">${fmt(c.floor + 1)}<span class="of">/12</span></td>
    <td style="text-align:right">${(c.lowerBound ? "≥ " : "") + fmt(c.stealth)}</td>
  </tr>`;
}

function renderStealthTable() {
  const s = SNK;
  $("stealthTablePanel").style.display = "";
  $("stealthTablePanel").innerHTML = `
    <h2>${UI.sprite("Sneaking_Ninja", 20, "etc")} Ninja Twins <span class="hint">Stealth lowers detection rate on whichever floor a twin is currently working.
      <span class="tip" title="Stealth itself is floor-independent — only the downstream detection curve reads the twin's current floor. Values below are per-character, computed as-if-active.">ⓘ</span></span></h2>
    <div class="scroll"><table><tr><th>Twin</th><th style="text-align:right">Floor</th><th style="text-align:right">Stealth</th></tr>${s.stealthPerChar.map(stealthRowHtml).join("")}</table></div>
  `;
}

/* ============================================================================================
 * Jade Emporium checklist (owned/total, missing-first cap+show-more, glossary tooltip).
 * ============================================================================================ */
function emporiumRowHtml(e) {
  const desc = GLOSS?.jadeEmporium?.find((x) => x.idx === e.idx)?.desc;
  const status = e.owned === 1 ? `<span class="chip live">owned</span>`
    : e.owned === null ? `<span class="chip soon">unreadable</span>`
    : `<span class="chip dead">not bought</span>`;
  return `<tr class="${e.owned === 1 ? "dim" : ""}">
    <td><b>${e.name}</b> ${desc ? `<span class="tip" title="${desc.replace(/"/g, "&quot;")}">ⓘ</span>` : ""}</td>
    <td>${status}</td>
  </tr>`;
}

function renderEmporium() {
  const s = SNK;
  const sorted = s.emporium.list.slice().sort((a, b) => (a.owned === 1 ? 1 : 0) - (b.owned === 1 ? 1 : 0));
  const shown = EMPORIUM_SHOWALL ? sorted : sorted.slice(0, 10);
  $("emporiumPanel").style.display = "";
  $("emporiumPanel").innerHTML = `
    <h2>${UI.sprite("jade_coin", 20, "etc")} Jade Emporium <span class="hint">${s.emporium.total} account-wide unlocks, paid in Jade Coins — missing ones shown first.
      ${s.emporium.unknown ? `<span class="tip" title="${s.emporium.unknown} ids can't be read as owned/not-owned from the save at all (ownership-flag string gap) — shown as 'unreadable', never guessed.">ⓘ</span>` : ""}</span></h2>
    <div class="scroll"><table><tr><th>Unlock</th><th>Status</th></tr>${shown.map(emporiumRowHtml).join("")}</table></div>
    ${sorted.length > 10 ? `<button class="showmore" id="emporiumShowMore">${EMPORIUM_SHOWALL ? "show fewer" : `show ${sorted.length - 10} more`}</button>` : ""}
  `;
  const more = $("emporiumShowMore");
  if (more) more.onclick = () => { EMPORIUM_SHOWALL = !EMPORIUM_SHOWALL; renderEmporium(); };
}

/* ============================================================================================
 * Pristine charms (owned/total, gacha rolls) + Gemstones (8, full table, no cap needed).
 * ============================================================================================ */
function charmRowHtml(c) {
  return `<tr class="${c.owned ? "dim" : ""}">
    <td><b>${c.name}</b></td>
    <td>${c.owned ? `<span class="chip live">owned</span>` : `<span class="chip dead">missing</span>`}</td>
    <td class="note">${c.bonus}</td>
    <td style="text-align:right">${c.owned ? fmt(c.value) : "—"}</td>
  </tr>`;
}

function renderCharms() {
  const s = SNK;
  const sorted = s.charms.list.slice().sort((a, b) => (a.owned ? 1 : 0) - (b.owned ? 1 : 0));
  const shown = CHARMS_SHOWALL ? sorted : sorted.slice(0, 10);
  $("charmsPanel").style.display = "";
  $("charmsPanel").innerHTML = `
    <h2>${UI.sprite("jade_coin", 20, "etc")} Pristine Charms <span class="hint">${s.charms.total} gacha-rolled charms, each a distinct account-wide bonus.
      <span class="tip" title="Pristine charm rolls come from a gacha with a decaying chance (starts ~0.1%%, drops toward ~0.001%% as more are owned) — no timer here, just current rolls remaining and what you'd unlock next.">ⓘ</span></span></h2>
    <div class="cards" style="margin-bottom:10px">
      <div class="tile"><div class="label">Pristine rolls remaining</div><div class="value">${fmt(s.gacha.pristineRollsRemaining)}</div><div class="sub">charm roll counter: ${fmt(s.gacha.charmRollCounter)}</div></div>
      <div class="tile"><div class="label">Symbol rolls remaining</div><div class="value">${fmt(s.gacha.symbolRollsRemaining)}</div><div class="sub">Strange Symbols upgrade gate</div></div>
    </div>
    <div class="scroll"><table><tr><th>Charm</th><th>Status</th><th>Bonus</th><th style="text-align:right">Value</th></tr>${shown.map(charmRowHtml).join("")}</table></div>
    ${sorted.length > 10 ? `<button class="showmore" id="charmsShowMore">${CHARMS_SHOWALL ? "show fewer" : `show ${sorted.length - 10} more`}</button>` : ""}
  `;
  const more = $("charmsShowMore");
  if (more) more.onclick = () => { CHARMS_SHOWALL = !CHARMS_SHOWALL; renderCharms(); };
}

function gemstoneRowHtml(g) {
  const desc = GLOSS?.gemstones?.find((x) => x.idx === g.idx)?.desc;
  return `<tr class="${g.collected ? "dim" : ""}">
    <td><b>${g.name}</b> ${desc ? `<span class="tip" title="${desc.replace(/"/g, "&quot;")}">ⓘ</span>` : ""}</td>
    <td>${g.collected ? `<span class="chip live">collected</span>` : `<span class="chip dead">missing</span>`}</td>
    <td style="text-align:right">${(g.lowerBound ? "≥ " : "") + fmt(g.value)}</td>
  </tr>`;
}

function renderGemstones() {
  const s = SNK;
  $("gemstonesPanel").style.display = "";
  $("gemstonesPanel").innerHTML = `
    <h2>${UI.sprite("jade_coin", 20, "etc")} Gemstones <span class="hint">8 collectible gemstones, each its own bonus formula (Aquamarine feeds Stealth, Emerald feeds upgrade cost, Firefrost feeds Charm Collector, etc).</span></h2>
    <div class="scroll"><table><tr><th>Gemstone</th><th>Status</th><th style="text-align:right">Bonus value</th></tr>${s.gemstones.map(gemstoneRowHtml).join("")}</table></div>
  `;
}

/* ============================================================================================
 * Generic recipe-breakdown renderer for stealth (per-character — byChar selector).
 * ============================================================================================ */
const RECIPE_MODULES = [
  { name: "stealth", title: "Ninja Stealth", icon: ["Sneaking_Ninja", "etc"],
    blurb: "What lowers detection rate — per-character (Sneaking level, statue, gemstone, cards, achievements, Emperor, sushi, and more)." },
];

function currentResult(cfg, st) {
  const sel = CHARSEL[cfg.name] || "account";
  if (sel !== "account" && st.byChar) {
    const c = st.byChar.find((x) => String(x.charIdx) === sel);
    if (c) return c.result;
  }
  return st.collapsed;
}

function bucketTerms(r) {
  const bracket = 1 + r.additivePoolPct / 100;
  const eqMult = (t) => t.kind === "add"
    ? (100 + r.additivePoolPct) / Math.max(1, 100 + r.additivePoolPct - (t.value || 0))
    : t.kind === "mul" ? (t.value || 1)
    : (bracket + (t.value || 0)) / bracket;
  const isNeutral = (t) => (t.kind === "add" && t.value === 0) || (t.kind === "mul" && t.value === 1);
  const locked = r.terms.filter((t) => isNeutral(t) && t.status !== "unknown" && t.status !== "per-char");
  const lockedSet = new Set(locked);
  const rest = r.terms.filter((t) => !lockedSet.has(t)).sort((a, b) => eqMult(b) - eqMult(a));
  return { rest, locked, eqMult };
}

function termRow(cfg, t, disp, eqMult, isPoints) {
  const d = disp[t.id] || {};
  const label = d.label || t.key;
  const rawVal = t.kind === "add" ? "+" + fmt(t.value) + (isPoints ? " pts" : "%")
    : t.kind === "mul" ? "×" + fmt(t.value)
    : fmt(t.value);
  const eq = eqMult(t);
  const shownVal = isPoints ? rawVal
    : t.kind === "mul" ? "×" + fmt(eq)
    : `×${eq >= 1.1 ? eq.toFixed(2) : eq.toFixed(3)}<div class="expr">${rawVal} of pool</div>`;
  const key = `stat.${cfg.name}.${t.id}`;
  const parts = t.parts || [];
  return `<tr class="expander" data-mod="${cfg.name}" data-term="${t.id}">
      <td style="max-width:340px"><b>${label}</b> ${parts.length ? '<span class="expr">▸</span>' : ""}
        ${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
      <td style="text-align:right">${shownVal}</td>
      <td>${chip(t.status)}</td>
      <td>${spark(key)}</td>
      <td class="note">${d.how || t.note || ""}</td>
    </tr>
    ${parts.length ? `<tr class="parts" data-parts="${cfg.name}_${t.id}" style="display:none"><td colspan="5">
      ${parts.map((p) => `<div class="partrow">${p.label}: <b>${p.valueText ?? fmt(p.value)}</b> ${p.note ? `<span class="expr">${p.note}</span>` : ""}</div>`).join("")}
    </td></tr>` : ""}`;
}

function lockedRow(t, disp) {
  const d = disp[t.id] || {};
  const label = d.label || t.key;
  return `<tr class="dim">
    <td style="max-width:340px"><b>${label}</b>${d.where ? `<div class="where">${d.where}</div>` : ""}</td>
    <td style="text-align:right">—</td>
    <td><span class="chip dead">locked/inactive</span></td>
    <td></td>
    <td class="note">${d.how || t.note || "Not contributing right now — the source system is locked or inactive on this account."}</td>
  </tr>`;
}

function pendingModuleHTML(cfg) {
  return `<section class="panel pending" id="mod_${cfg.name}">
    <h2>${UI.sprite(cfg.icon[0], 20, cfg.icon[1])} ${cfg.title}<span class="pill-pending">recipe pending</span></h2>
    <p class="note">${cfg.blurb} This recipe hasn't been registered in <code>stats/index.mjs</code> yet.</p>
  </section>`;
}

function liveModuleHTML(cfg, st) {
  if (!(cfg.name in CHARSEL)) CHARSEL[cfg.name] = "account";
  const r = currentResult(cfg, st);
  const isPoints = st.format === "points";
  const disp = st.display || {};
  const { rest, locked, eqMult } = bucketTerms(r);
  const unknownCount = r.unknown.length;
  const perCharCount = r.terms.filter((t) => t.status === "per-char").length;
  const showAll = !!SHOWALL[cfg.name];
  const rows = showAll ? rest : rest.slice(0, 12);

  const caveat = (r.lowerBound || perCharCount) ? `<div class="lowerbound">
    <b>Lower bound.</b> ${unknownCount ? `${unknownCount} of ${r.terms.length} sources could not be derived and sit at their neutral element — the real value is higher.` : "Minor inputs remain unknowable — the real value can only be higher."}
    ${perCharCount ? ` ${perCharCount} source${perCharCount > 1 ? "s are" : " is"} per-character — pick a character to resolve ${perCharCount > 1 ? "them" : "it"}.` : ""}
  </div>` : "";

  const charSelHtml = st.byChar ? `<select class="inlinesel charSel" data-mod="${cfg.name}">
      <option value="account" ${CHARSEL[cfg.name] === "account" ? "selected" : ""}>Account view</option>
      ${st.byChar.map((c) => `<option value="${c.charIdx}" ${String(c.charIdx) === CHARSEL[cfg.name] ? "selected" : ""}>${charName(c.charIdx)}</option>`).join("")}
    </select>` : "";

  const valueText = (r.lowerBound ? "≥ " : "") + fmt(r.value) + (isPoints ? " pts" : "x");

  return `<section class="panel" id="mod_${cfg.name}">
    <h2>${UI.sprite(cfg.icon[0], 20, cfg.icon[1])} ${cfg.title} <span class="hint">${cfg.blurb}</span> <span style="flex:1"></span> ${charSelHtml}</h2>
    ${caveat}
    <div class="cards" style="margin-bottom:10px">
      <div class="tile">${UI.sprite(cfg.icon[0], 28, cfg.icon[1])}<div class="label">${cfg.title}</div><div class="value">${valueText}</div>
        <div class="sub">${CHARSEL[cfg.name] === "account" ? "account view" : "as " + charName(Number(CHARSEL[cfg.name]))}</div></div>
      <div class="tile"><div class="label">Coverage</div><div class="value">${r.terms.length - unknownCount - perCharCount}<span class="of">/${r.terms.length}</span></div>
        <div class="sub">${perCharCount ? `+${perCharCount} per-character` : "sources computed"}</div></div>
      ${locked.length ? `<div class="tile"><div class="label">Locked / inactive</div><div class="value">${locked.length}</div><div class="sub">not contributing right now</div></div>` : ""}
    </div>
    <div class="scroll"><table>
      <tr><th>Source</th><th style="text-align:right">Effect</th><th>Status</th><th>History</th><th>How it works</th></tr>
      ${rows.map((t) => termRow(cfg, t, disp, eqMult, isPoints)).join("")}
    </table></div>
    ${rest.length > 12 ? `<button class="showmore" data-mod="${cfg.name}">${showAll ? "show fewer" : `show ${rest.length - 12} more`}</button>` : ""}
    ${locked.length ? `<details class="fold" style="margin-top:6px"><summary>${locked.length} locked/inactive source${locked.length > 1 ? "s" : ""}</summary>
      <div class="scroll"><table>${locked.map((t) => lockedRow(t, disp)).join("")}</table></div>
    </details>` : ""}
    ${unknownCount ? `<details class="fold" style="margin-top:6px"><summary>${unknownCount} source${unknownCount > 1 ? "s" : ""} not derivable yet</summary>
      <ul class="unknowns">${r.unknown.map((u) => `<li>${u}</li>`).join("")}</ul>
    </details>` : ""}
  </section>`;
}

function renderRecipeModules() {
  for (const cfg of RECIPE_MODULES) {
    const host = $("rmod_" + cfg.name);
    if (!host) continue;
    const st = DATA?.stats?.[cfg.name];
    host.innerHTML = st ? liveModuleHTML(cfg, st) : pendingModuleHTML(cfg);
  }
  wireModuleEvents();
}

function wireModuleEvents() {
  document.querySelectorAll(".charSel").forEach((sel) => sel.addEventListener("change", (e) => {
    CHARSEL[e.target.dataset.mod] = e.target.value;
    renderRecipeModules();
  }));
  document.querySelectorAll(".showmore[data-mod]").forEach((btn) => btn.addEventListener("click", (e) => {
    const m = e.target.dataset.mod;
    SHOWALL[m] = !SHOWALL[m];
    renderRecipeModules();
  }));
  document.querySelectorAll("tr.expander[data-mod]").forEach((tr) => tr.addEventListener("click", () => {
    const p = document.querySelector(`tr[data-parts="${tr.dataset.mod}_${tr.dataset.term}"]`);
    if (p) p.style.display = p.style.display === "none" ? "" : "none";
  }));
}

async function loadHistory() {
  const keys = [];
  for (const cfg of RECIPE_MODULES) {
    const st = DATA?.stats?.[cfg.name];
    if (!st) continue;
    keys.push(`stat.${cfg.name}`);
    for (const t of st.collapsed.terms) if (t.status !== "unknown") keys.push(`stat.${cfg.name}.${t.id}`);
  }
  if (!keys.length) return;
  try {
    const res = await fetch(`/api/history?keys=${keys.join(",")}`);
    SERIES = (await res.json()).series || {};
  } catch { SERIES = {}; }
}

/* ============================================================================================
 * Boot.
 * ============================================================================================ */
async function boot() {
  try {
    const stateRes = await fetch("/api/state");
    const state = await stateRes.json();
    if (!state.snapshot) { $("err").textContent = "No snapshot yet — Sync on the dashboard first."; return; }
    SNAP = state.snapshot;
    $("meta").textContent = new Date(SNAP.ts).toLocaleString();
    if (!SNAP.entities?.w6) {
      $("err").innerHTML = `No <code>w6</code> entity on this snapshot — run <b>POST /api/rebuild</b>, then reload.`;
      return;
    }
    SNK = SNAP.entities.w6.sneaking;

    const [statsRes, glossRes] = await Promise.all([fetch("/api/stats"), fetch("/api/w6")]);
    const statsJson = await statsRes.json();
    DATA = statsJson.ok && statsJson.stats ? statsJson : null;
    const glossJson = await glossRes.json().catch(() => null);
    GLOSS = glossJson?.ok ? glossJson : null;
    if (!DATA) $("err").textContent = "No snapshot with a stored raw save yet — Sync first to unlock the recipe breakdowns below.";

    renderTiles();
    renderStealthTable();
    renderEmporium();
    renderCharms();
    renderGemstones();
    renderRecipeModules();
    await loadHistory();
    renderRecipeModules();
  } catch (e) { $("err").textContent = "Server error: " + e.message + " — is the companion server running?"; }
}
boot();
</script>
</body>
</html>
